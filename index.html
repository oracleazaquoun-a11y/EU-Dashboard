<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, Arial;
  background:#0b1020;
  color:white;
  padding:20px;
}

h1 { margin-bottom:10px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card {
  background:#121a33;
  padding:15px;
  border-radius:12px;
}

input {
  padding:10px;
  margin-right:10px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.green{color:#35d07f;}
.red{color:#ff6b6b;}

table{width:100%;margin-top:10px;}
td,th{padding:10px;text-align:left;}

canvas { margin-top:10px; }
</style>
</head>

<body>

<h1>📊 Pro Portfolio</h1>

<div style="margin-bottom:20px;">
  <input id="symbolInput" placeholder="Ticker (AAPL / XETR:ENR)">
  <input id="entryInput" placeholder="Købskurs" type="number">
  <input id="investInput" placeholder="Beløb DKK" type="number">
  <button onclick="addStock()">Tilføj</button>
  <button onclick="resetPortfolio()">Reset</button>
</div>

<div class="grid">
  <div class="card">
    <div>Value</div>
    <h2 id="value">-</h2>
  </div>

  <div class="card">
    <div>P/L</div>
    <h2 id="pl">-</h2>
  </div>
</div>

<table>
<thead>
<tr>
<th>Stock</th>
<th>Price</th>
<th>Entry</th>
<th>P/L</th>
<th>%</th>
<th>Target</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="charts"></div>

<script>

const fx = 7.0;

// ===== PORTFOLIO =====
let portfolio = JSON.parse(localStorage.getItem("portfolio")) || [
  { name:"OKLO", symbol:"OKLO", invested:11000, entry:65, target:99 }
];

// ===== FETCH LIVE PRICES =====
async function fetchQuote(symbols) {
  const res = await fetch(`/api/quote?symbols=${symbols}`);
  return await res.json();
}

// ===== FETCH HISTORIK =====
async function fetchChart(symbol) {
  try {
    const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=D&count=30&token=demo`);
    const data = await res.json();
    return data.c || [];
  } catch {
    return [];
  }
}

// ===== ADD STOCK =====
function addStock() {
  const symbol = document.getElementById("symbolInput").value.toUpperCase();
  const entry = parseFloat(document.getElementById("entryInput").value);
  const invested = parseFloat(document.getElementById("investInput").value);

  if (!symbol || !entry || !invested) {
    alert("Udfyld alle felter");
    return;
  }

  portfolio.push({
    name: symbol,
    symbol: symbol,
    invested: invested,
    entry: entry,
    target: entry * 1.3
  });

  save();
  update();
}

// ===== RESET =====
function resetPortfolio() {
  localStorage.clear();
  location.reload();
}

// ===== SAVE =====
function save() {
  localStorage.setItem("portfolio", JSON.stringify(portfolio));
}

// ===== UPDATE DASHBOARD =====
async function update() {

  const symbols = portfolio.map(p=>p.symbol).join(",");
  const data = await fetchQuote(symbols);

  let total=0, cost=0;
  let html="";
  let chartsHTML="";

  for (let d of data) {
    const p = portfolio.find(x=>x.symbol===d.symbol);
    if (!p || !d.price) continue;

    const shares = p.invested/(p.entry*fx);
    const value = shares*d.price*fx;
    const pl = value-p.invested;
    const pct = (pl/p.invested)*100;

    total += value;
    cost += p.invested;

    html += `
      <tr>
        <td><b>${p.name}</b></td>
        <td>$${d.price.toFixed(2)}</td>
        <td>$${p.entry}</td>
        <td class="${pl>=0?'green':'red'}">${pl.toFixed(0)}</td>
        <td class="${pct>=0?'green':'red'}">${pct.toFixed(1)}%</td>
        <td>$${p.target.toFixed(0)}</td>
      </tr>
    `;

    chartsHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <canvas id="chart_${p.symbol}" height="80"></canvas>
      </div>
    `;

    // chart data
    const history = await fetchChart(p.symbol);

    setTimeout(()=>{
      new Chart(document.getElementById("chart_"+p.symbol), {
        type:'line',
        data:{
          labels:history,
          datasets:[{
            data:history,
            borderColor:"#7c9cff",
            tension:0.3
          }]
        },
        options:{
          plugins:{legend:{display:false}},
          scales:{x:{display:false},y:{display:false}}
        }
      });
    },100);

  }

  document.getElementById("table").innerHTML = html;
  document.getElementById("charts").innerHTML = chartsHTML;

  const totalPL = total-cost;
  const totalPct = (totalPL/cost)*100;

  document.getElementById("value").innerText = total.toFixed(0)+" kr";
  document.getElementById("pl").innerHTML =
    `<span class="${totalPL>=0?'green':'red'}">${totalPL.toFixed(0)} kr (${totalPct.toFixed(1)}%)</span>`;

  save();
}

// ===== AUTO UPDATE =====
setInterval(update,10000);
update();

</script>

</body>
</html>

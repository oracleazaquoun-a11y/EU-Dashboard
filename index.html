<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EU Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: Inter, Arial;
  background:#f6f6f6;
  margin:0;
  padding:30px;
  color:#111;
}

h1 { margin-bottom:5px; }
.sub { color:#666; margin-bottom:20px; }

.bar {
  display:flex;
  height:6px;
  margin-bottom:30px;
}
.bar div { flex:1 }
.bar div:nth-child(1){background:#6c63ff;}
.bar div:nth-child(2){background:#4caf50;}
.bar div:nth-child(3){background:#2196f3;}
.bar div:nth-child(4){background:#ff9800;}
.bar div:nth-child(5){background:#f44336;}

.grid {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  margin-bottom:30px;
}

.metric h2 { margin:5px 0; }

table {
  width:100%;
  border-collapse:collapse;
  background:white;
  border-radius:10px;
  overflow:hidden;
}

th, td {
  padding:12px;
  border-bottom:1px solid #eee;
}

th { font-size:12px; color:#666; }

.badge {
  padding:4px 8px;
  border-radius:10px;
  font-size:12px;
}

.green { color:#2e7d32; }
.red { color:#c62828; }

.tag1 { background:#e3f2fd; }
.tag2 { background:#fce4ec; }
.tag3 { background:#e8f5e9; }
.tag4 { background:#fff3e0; }
.tag5 { background:#f3e5f5; }

.chart-container {
  margin-top:40px;
  background:white;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>Europæiske aktier — 50.000 DKK</h1>
<div class="sub">5 spekulative picks · Frankfurt · Paris · DAX / CAC / XETRA</div>

<div class="bar">
  <div></div><div></div><div></div><div></div><div></div>
</div>

<div class="grid">
  <div class="metric">
    Investeret
    <h2 id="invested">50.000 kr</h2>
  </div>

  <div class="metric">
    Nuværende værdi
    <h2 id="value">-</h2>
  </div>

  <div class="metric">
    Samlet P&L
    <h2 id="pl">-</h2>
  </div>

  <div class="metric">
    EUR/DKK
    <h2>7.46</h2>
    <small>fast kurs brugt</small>
  </div>
</div>

<table>
<thead>
<tr>
<th>Aktie</th>
<th>Sektor</th>
<th>Kurs</th>
<th>Investeret</th>
<th>P&L</th>
<th>P&L %</th>
<th>Mål</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div class="chart-container">
  <h3>P&L visualisering</h3>
  <canvas id="portfolioChart"></canvas>
</div>

<script>

const fx = 7.46;

const portfolio = [
  { name:"ENR", symbol:"XETR:ENR", sector:"Energi", tag:"tag1", invested:11000, entry:160, target:220 },
  { name:"ALO", symbol:"EPA:ALO", sector:"Transport", tag:"tag2", invested:11000, entry:15, target:23 },
  { name:"NCH2", symbol:"XETR:NCH2", sector:"Hydrogen", tag:"tag3", invested:9000, entry:5, target:13 },
  { name:"HEI", symbol:"XETR:HEI", sector:"Materialer", tag:"tag4", invested:10000, entry:170, target:240 },
  { name:"NDXG", symbol:"XETR:NDX1", sector:"Vind", tag:"tag5", invested:9000, entry:35, target:58 }
];

// historik lagres
let history = JSON.parse(localStorage.getItem("history")) || [];

async function fetchQuote(symbols) {
  const res = await fetch(`/api/quote?symbols=${symbols}`);
  return await res.json();
}

async function update() {

  const symbols = portfolio.map(p=>p.symbol).join(",");
  const data = await fetchQuote(symbols);

  let total=0, cost=0;
  let html="";

  data.forEach(d => {
    const p = portfolio.find(x=>x.symbol===d.symbol);
    if (!p || !d.price) return;

    const shares = p.invested/(p.entry);
    const value = shares*d.price;
    const pl = value - p.invested;
    const pct = (pl/p.invested)*100;

    total += value;
    cost += p.invested;

    const targetPct = ((p.target - d.price)/d.price)*100;

    html += `
      <tr>
        <td><b>${p.name}</b></td>
        <td><span class="badge ${p.tag}">${p.sector}</span></td>
        <td>€${d.price.toFixed(2)}</td>
        <td>${p.invested} kr</td>
        <td class="${pl>=0?'green':'red'}">${pl.toFixed(0)}</td>
        <td class="${pct>=0?'green':'red'}">${pct.toFixed(1)}%</td>
        <td>€${p.target} (${targetPct.toFixed(0)}%)</td>
      </tr>
    `;
  });

  document.getElementById("table").innerHTML = html;

  const totalPL = total-cost;
  const totalPct = cost ? (totalPL/cost)*100 : 0;

  document.getElementById("value").innerText = total.toFixed(0)+" kr";
  document.getElementById("pl").innerHTML =
    `<span class="${totalPL>=0?'green':'red'}">${totalPL.toFixed(0)} kr (${totalPct.toFixed(1)}%)</span>`;

  // gem historik
  history.push(total);
  if (history.length > 50) history.shift();
  localStorage.setItem("history", JSON.stringify(history));

  drawChart();
}

let chart;

function drawChart() {
  const ctx = document.getElementById("portfolioChart");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: history.map((_, i)=>i),
      datasets: [{
        data: history,
        borderColor: '#2196f3',
        fill: false,
        tension: 0.3
      }]
    },
    options: {
      plugins: { legend: { display:false }},
      scales: { x:{display:false} }
    }
  });
}

setInterval(update,10000);
update();

</script>

</body>
</html>

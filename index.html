<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Portfolio</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Inter, Arial;
  background:#0b1020;
  color:white;
  padding:20px;
}

h1 { margin-bottom:15px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:15px;
  margin-bottom:20px;
}

.card {
  background:#121a33;
  padding:15px;
  border-radius:12px;
}

.green{color:#35d07f;}
.red{color:#ff6b6b;}

table {width:100%;margin-top:10px;}
td,th {padding:10px;text-align:left;}

.badge {
  background:#1f2a50;
  padding:4px 10px;
  border-radius:10px;
  font-size:12px;
}
</style>
</head>

<body>

<h1>📊 Pro Portfolio</h1>

<div class="grid">
  <div class="card">
    <div>Total Value</div>
    <h2 id="value">-</h2>
  </div>

  <div class="card">
    <div>Total P/L</div>
    <h2 id="pl">-</h2>
  </div>
</div>

<table>
<thead>
<tr>
<th>Stock</th>
<th>Price</th>
<th>Entry</th>
<th>P/L</th>
<th>%</th>
<th>Target</th>
<th>To Target</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

<div id="charts"></div>

<script>

const fx = 6.9;

const portfolio = [
  { name:"OKLO", symbol:"OKLO", invested:11000, entry:65, target:99 },
  { name:"IONQ", symbol:"IONQ", invested:11000, entry:40, target:66 },
  { name:"NBIS", symbol:"NBIS", invested:10000, entry:140, target:211 },
  { name:"SERV", symbol:"SERV", invested:9000, entry:8, target:16 },
  { name:"UEC", symbol:"UEC", invested:9000, entry:12, target:12 }
];

async function fetchQuote(symbols) {
  const res = await fetch(`/api/quote?symbols=${symbols}`);
  return await res.json();
}

async function fetchChart(symbol) {
  const res = await fetch(`https://finnhub.io/api/v1/stock/candle?symbol=${symbol}&resolution=D&count=30&token=demo`);
  const data = await res.json();
  return data.c || [];
}

async function update() {

  const symbols = portfolio.map(p=>p.symbol).join(",");
  const data = await fetchQuote(symbols);

  let total=0, cost=0;
  let html="";
  let chartsHTML="";

  for (let d of data) {
    const p = portfolio.find(x=>x.symbol===d.symbol);

    const shares = p.invested/(p.entry*fx);
    const value = shares*d.price*fx;
    const pl = value-p.invested;
    const pct = (pl/p.invested)*100;

    const toTarget = ((p.target - d.price)/d.price)*100;

    total+=value;
    cost+=p.invested;

    html += `
      <tr>
        <td><b>${p.name}</b></td>
        <td>$${d.price.toFixed(2)}</td>
        <td>$${p.entry}</td>
        <td class="${pl>=0?'green':'red'}">${pl.toFixed(0)}</td>
        <td class="${pct>=0?'green':'red'}">${pct.toFixed(1)}%</td>
        <td>$${p.target}</td>
        <td class="${toTarget>=0?'green':'red'}">${toTarget.toFixed(1)}%</td>
      </tr>
    `;

    chartsHTML += `
      <div class="card">
        <h3>${p.name}</h3>
        <canvas id="${p.symbol}" height="80"></canvas>
      </div>
    `;
  }

  document.getElementById("table").innerHTML = html;
  document.getElementById("charts").innerHTML = chartsHTML;

  const totalPL = total-cost;
  const totalPct = (totalPL/cost)*100;

  document.getElementById("value").innerText = total.toFixed(0)+" kr";
  document.getElementById("pl").innerHTML =
    `<span class="${totalPL>=0?'green':'red'}">${totalPL.toFixed(0)} kr (${totalPct.toFixed(1)}%)</span>`;

}

setInterval(update,10000);
update();

</script>

</body>
</html>

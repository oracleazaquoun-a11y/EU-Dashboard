<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Europa Trading Dashboard – Multi Chart</title>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
body { margin:0; font-family:Arial; background:#0b1220; color:white; }
.wrap { padding:16px; }
.grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:16px; }
.card { background:#111827; border-radius:14px; padding:10px; }
.title { font-size:14px; margin-bottom:6px; color:#94a3b8; }
.chart { height:360px; }
.top { margin-bottom:12px; }
input { width:100%; padding:10px; border-radius:10px; border:1px solid #334155; background:#0b1220; color:white; }
</style>
</head>
<body>
<div class="wrap">

<div class="top">
  <div class="title">Finnhub API (kun til P/L – charts er TradingView)</div>
  <input id="apiKey" value="d7ktdchr01qiqbcvmhsgd7ktdchr01qiqbcvmht0" />
</div>

<div class="grid">
  <div class="card">
    <div class="title">ASML</div>
    <div id="chart1" class="chart"></div>
  </div>
  <div class="card">
    <div class="title">Siemens Energy</div>
    <div id="chart2" class="chart"></div>
  </div>
  <div class="card">
    <div class="title">Kering</div>
    <div id="chart3" class="chart"></div>
  </div>
  <div class="card">
    <div class="title">Stellantis</div>
    <div id="chart4" class="chart"></div>
  </div>
  <div class="card">
    <div class="title">Alstom</div>
    <div id="chart5" class="chart"></div>
  </div>
</div>

</div>

<script>

function createChart(container, symbol){
  new TradingView.widget({
    "container_id": container,
    "width": "100%",
    "height": 350,
    "symbol": symbol,
    "interval": "60",
    "timezone": "Europe/Amsterdam",
    "theme": "dark",
    "style": "1",
    "hide_side_toolbar": true,
    "hide_top_toolbar": false,
    "studies": ["RSI@tv-basicstudies","MACD@tv-basicstudies"]
  });
}

// TradingView symbols (korrekte)
createChart("chart1", "EURONEXT:ASML");
createChart("chart2", "XETR:ENR");
createChart("chart3", "EURONEXT:KER");
createChart("chart4", "BIT:STLAM");
createChart("chart5", "EURONEXT:ALO");

</script>

</body>
</html>
